<!DOCTYPE html><html lang="en" class="dark"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>FleetGuard — Users</title><link href="./dist/output.css" rel="stylesheet"/><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/><style>:root{--c-surface:#10131a;--c-surface-low:#191c22;--c-surface-container:#1d2026;--c-surface-high:#272a31;--c-surface-highest:#32353c;--c-on-surface:#e1e2eb;--c-primary:#ffb5a0;--c-primary-container:#ff5722;--c-tertiary:#78dc77;--c-error:#ffb4ab;--c-outline-variant:#5b4039;--c-text-muted:#6b7280;--shadow-card:0 4px 24px rgba(0,0,0,.25)}html.light{--c-surface:#f5f5f7;--c-surface-low:#ebebed;--c-surface-container:#fff;--c-surface-high:#e4e4e6;--c-surface-highest:#d8d8da;--c-on-surface:#1a1a1e;--c-primary:#c94a1a;--c-primary-container:#e84e1d;--c-tertiary:#1f7a1e;--c-error:#c62828;--c-outline-variant:#d1a99e;--c-text-muted:#9ca3af}*,*::before,*::after{box-sizing:border-box}body{font-family:'Inter',sans-serif;background:var(--c-surface);color:var(--c-on-surface);min-height:100dvh;transition:background .3s,color .3s;margin:0}.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;user-select:none}.sidebar{position:fixed;inset-block:0;left:0;width:15rem;background:var(--c-surface-low);display:flex;flex-direction:column;z-index:50;border-right:1px solid color-mix(in srgb,var(--c-outline-variant) 15%,transparent);transition:transform .3s}.main-content{margin-left:15rem;min-height:100dvh}.nav-item{display:flex;align-items:center;gap:.75rem;padding:.625rem 1.25rem;margin:.125rem .5rem;border-radius:.625rem;font-size:.75rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--c-text-muted);transition:background .2s,color .2s;cursor:pointer;text-decoration:none}.nav-item:hover{background:color-mix(in srgb,var(--c-surface-highest) 50%,transparent);color:var(--c-on-surface)}.nav-item.active{background:var(--c-primary-container);color:#fff;box-shadow:0 0 12px color-mix(in srgb,var(--c-primary-container) 50%,transparent)}.top-bar{position:sticky;top:0;z-index:40;display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;background:var(--c-surface);border-bottom:1px solid color-mix(in srgb,var(--c-outline-variant) 12%,transparent)}.card{background:var(--c-surface-container);border-radius:.75rem;padding:1.5rem;box-shadow:var(--shadow-card)}.icon-btn{display:flex;align-items:center;justify-content:center;width:2rem;height:2rem;border-radius:.5rem;border:none;background:transparent;cursor:pointer;color:var(--c-text-muted);transition:background .15s}.icon-btn:hover{background:var(--c-surface-highest);color:var(--c-on-surface)}.icon-btn.del:hover{background:color-mix(in srgb,var(--c-error) 15%,transparent);color:var(--c-error)}.theme-toggle{display:flex;align-items:center;gap:.375rem;padding:.375rem .75rem;border-radius:9999px;background:color-mix(in srgb,var(--c-surface-highest) 60%,transparent);border:1px solid color-mix(in srgb,var(--c-outline-variant) 20%,transparent);cursor:pointer;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--c-on-surface)}.badge-ok{display:inline-flex;padding:.2rem .6rem;border-radius:9999px;font-size:.7rem;font-weight:700;background:color-mix(in srgb,var(--c-tertiary) 12%,transparent);border:1px solid color-mix(in srgb,var(--c-tertiary) 25%,transparent);color:var(--c-tertiary)}.data-table{width:100%;border-collapse:collapse}.data-table th{font-size:.625rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--c-text-muted);padding:.75rem 1rem;text-align:left;border-bottom:1px solid color-mix(in srgb,var(--c-outline-variant) 15%,transparent)}.data-table td{padding:.875rem 1rem;font-size:.875rem;border-bottom:1px solid color-mix(in srgb,var(--c-outline-variant) 8%,transparent)}.data-table tr:hover td{background:color-mix(in srgb,var(--c-surface-highest) 30%,transparent)}.btn-primary{display:inline-flex;align-items:center;gap:.5rem;background:var(--c-primary-container);color:#fff;font-family:'Inter',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;padding:.625rem 1.25rem;border-radius:.625rem;border:none;cursor:pointer;transition:filter .2s}.btn-primary:hover{filter:brightness(1.12)}.btn-ghost{display:inline-flex;align-items:center;gap:.375rem;padding:.5rem .875rem;border-radius:.5rem;border:1px solid color-mix(in srgb,var(--c-outline-variant) 25%,transparent);background:transparent;color:var(--c-on-surface);font-size:.75rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer}.btn-ghost:hover{background:color-mix(in srgb,var(--c-surface-highest) 50%,transparent)}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}.modal-overlay.open{opacity:1;pointer-events:all}.modal-box{background:var(--c-surface-low);border-radius:1rem;padding:2rem;width:min(480px,94vw);transform:translateY(16px) scale(.97);transition:transform .25s;border:1px solid color-mix(in srgb,var(--c-outline-variant) 15%,transparent)}.modal-overlay.open .modal-box{transform:translateY(0) scale(1)}.fg-input{width:100%;background:color-mix(in srgb,var(--c-surface-highest) 30%,transparent);border:none;border-bottom:2px solid var(--c-surface-highest);color:var(--c-on-surface);padding:.75rem 1rem;border-radius:.375rem .375rem 0 0;outline:none;font-family:'Inter',sans-serif;font-size:.875rem}.fg-input:focus{border-bottom-color:var(--c-primary-container)}.fg-label{display:block;font-size:.625rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--c-text-muted);margin-bottom:.25rem}.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--c-surface-high);border-left:4px solid var(--c-tertiary);border-radius:.5rem;padding:.75rem 1rem;font-size:.8rem;font-weight:600;color:var(--c-on-surface);transform:translateX(120%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);min-width:260px;z-index:200}.toast.show{transform:translateX(0)}@media(max-width:900px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main-content{margin-left:0}}</style></head><body><aside class="sidebar" id="sidebar"><div style="padding:1.5rem 1.25rem 1rem"><div style="display:flex;align-items:center;gap:.625rem;margin-bottom:1.5rem"><div style="width:2rem;height:2rem;background:var(--c-primary-container);border-radius:.5rem;display:flex;align-items:center;justify-content:center"><span class="material-symbols-outlined" style="color:#fff;font-size:1.1rem;font-variation-settings:'FILL' 1">local_shipping</span></div><span style="color:var(--c-primary-container);font-size:1.25rem;font-weight:800;font-family:'Manrope',sans-serif;letter-spacing:-.03em">FleetGuard</span></div><div style="display:flex;align-items:center;gap:.75rem;padding:.625rem .75rem;background:var(--c-surface-container);border-radius:.75rem;margin-bottom:1.5rem"><div style="width:2.25rem;height:2.25rem;border-radius:.5rem;background:color-mix(in srgb,var(--c-primary-container) 20%,transparent);display:flex;align-items:center;justify-content:center;flex-shrink:0"><span class="material-symbols-outlined" style="color:var(--c-primary-container);font-size:1.1rem;font-variation-settings:'FILL' 1">manage_accounts</span></div><div><p style="font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--c-primary-container)" id="nav-user">Admin</p><p style="font-size:.7rem;color:var(--c-text-muted)">Fleet Command</p></div></div></div><nav style="flex:1;padding:0 0 1rem"><a href="./dashboard.html" class="nav-item "><span class="material-symbols-outlined" style="font-size:1.1rem">dashboard</span>Dashboard</a><a href="./index.html" class="nav-item "><span class="material-symbols-outlined" style="font-size:1.1rem">directions_car</span>Vehicles</a><a href="./drivers.html" class="nav-item "><span class="material-symbols-outlined" style="font-size:1.1rem">person</span>Drivers</a><a href="./calendar.html" class="nav-item "><span class="material-symbols-outlined" style="font-size:1.1rem">calendar_today</span>Calendar</a><a href="./reports.html" class="nav-item "><span class="material-symbols-outlined" style="font-size:1.1rem">analytics</span>Reports</a><a href="./driver-portal.html" class="nav-item "><span class="material-symbols-outlined" style="font-size:1.1rem">minor_crash</span>Driver Portal</a><a href="./users.html" class="nav-item active"><span class="material-symbols-outlined" style="font-size:1.1rem">group</span>Users</a></nav><div style="padding:1rem 1.25rem;border-top:1px solid color-mix(in srgb,var(--c-outline-variant) 15%,transparent)"><button onclick="logout()" class="btn-ghost" style="width:100%;justify-content:center"><span class="material-symbols-outlined" style="font-size:1rem">logout</span>Sign Out</button></div></aside><main class="main-content"><header class="top-bar"><div style="display:flex;align-items:center;gap:1rem"><button class="icon-btn" id="sidebar-toggle"><span class="material-symbols-outlined">menu</span></button><span style="color:color-mix(in srgb,var(--c-on-surface) 25%,transparent)">|</span><h1 style="font-family:'Manrope',sans-serif;font-size:1rem;font-weight:700;letter-spacing:-.01em">Users</h1></div><div style="display:flex;align-items:center;gap:.875rem"><button class="theme-toggle" id="theme-toggle"><span class="material-symbols-outlined" style="font-size:1rem" id="theme-icon">light_mode</span><span id="theme-label">Light</span></button><button class="icon-btn" style="position:relative"><span class="material-symbols-outlined" style="font-size:1.1rem">notifications</span><span style="position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--c-primary-container);border-radius:50%;border:2px solid var(--c-surface)"></span></button><div style="width:2.25rem;height:2.25rem;border-radius:50%;background:color-mix(in srgb,var(--c-primary-container) 20%,transparent);border:2px solid var(--c-primary-container);display:flex;align-items:center;justify-content:center"><span class="material-symbols-outlined" style="color:var(--c-primary-container);font-size:1.1rem;font-variation-settings:'FILL' 1">account_circle</span></div></div></header><div style="padding:1.75rem 2rem;max-width:1280px;margin:0 auto">
<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem">
  <div><h2 style="font-family:'Manrope',sans-serif;font-size:1.75rem;font-weight:800;letter-spacing:-.02em">Users</h2><p style="font-size:.8rem;color:var(--c-text-muted)">Manage system access and roles</p></div>
  <button class="btn-primary" onclick="openModal()"><span class="material-symbols-outlined" style="font-size:1rem">add</span>Add User</button>
</div>
<div class="card" style="padding:0;overflow:hidden">
  <table class="data-table"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
  <tbody id="users-tbody"></tbody></table>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
      <h3 style="font-family:'Manrope',sans-serif;font-size:1rem;font-weight:800" id="modal-title">Add User</h3>
      <button class="icon-btn" onclick="closeModal()"><span class="material-symbols-outlined">close</span></button>
    </div>
    <form id="user-form" onsubmit="saveUser(event)" style="display:flex;flex-direction:column;gap:1rem">
      <input type="hidden" id="edit-id"/>
      <div><label class="fg-label">Full Name</label><input class="fg-input" id="f-name" required placeholder="e.g. John Smith"/></div>
      <div><label class="fg-label">Email</label><input class="fg-input" id="f-email" type="email" required placeholder="user@fleetguard.io"/></div>
      <div><label class="fg-label">Role</label><select class="fg-input" id="f-role"><option>Admin</option><option>Dispatcher</option><option>Driver</option><option>Viewer</option></select></div>
      <div style="display:flex;gap:.75rem;margin-top:.25rem">
        <button type="button" class="btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn-primary" style="flex:2">Save User</button>
      </div>
    </form>
  </div>
</div></div></main><div id="toast" class="toast"></div><script>(function(){const s=localStorage.getItem('fg-theme')||'dark';applyTheme(s);if(localStorage.getItem('fg-auth')!=='1'){window.location.href='./login.html'}const u=localStorage.getItem('fg-user')||'Admin';const el=document.getElementById('nav-user');if(el)el.textContent=u.split('@')[0]})();function applyTheme(m){document.documentElement.classList.remove('dark','light');document.documentElement.classList.add(m);const i=document.getElementById('theme-icon');const l=document.getElementById('theme-label');if(i)i.textContent=m==='dark'?'light_mode':'dark_mode';if(l)l.textContent=m==='dark'?'Light':'Dark';localStorage.setItem('fg-theme',m)}document.getElementById('theme-toggle').addEventListener('click',()=>{const c=document.documentElement.classList.contains('dark')?'dark':'light';applyTheme(c==='dark'?'light':'dark')});document.getElementById('sidebar-toggle').addEventListener('click',()=>document.getElementById('sidebar').classList.toggle('open'));function logout(){localStorage.removeItem('fg-auth');localStorage.removeItem('fg-user');window.location.href='./login.html'}function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.style.borderLeftColor=type==='error'?'var(--c-error)':type==='warn'?'var(--c-primary-container)':'var(--c-tertiary)';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}const UKEY='fg_users_v1';
function loadUsers(){try{const u=JSON.parse(localStorage.getItem(UKEY)||'null');return u||[{name:'Admin',email:'admin@fleetguard.io',role:'Admin'}]}catch{return[]}}
function saveUsers(u){localStorage.setItem(UKEY,JSON.stringify(u))}
const rc={Admin:'var(--c-primary-container)',Dispatcher:'var(--c-tertiary)',Driver:'var(--c-primary)',Viewer:'var(--c-text-muted)'};
function render(){const users=loadUsers();document.getElementById('users-tbody').innerHTML=users.map((u,i)=>'<tr><td><div style="font-weight:700">'+u.name+'</div></td><td style="color:var(--c-text-muted);font-size:.8rem">'+u.email+'</td><td><span style="display:inline-flex;padding:.2rem .6rem;border-radius:9999px;font-size:.7rem;font-weight:700;background:color-mix(in srgb,'+(rc[u.role]||'var(--c-text-muted)')+' 15%,transparent);color:'+(rc[u.role]||'var(--c-text-muted)')+'">'+u.role+'</span></td><td><span class="badge-ok">Active</span></td><td><div style="display:flex;gap:.25rem"><button class="icon-btn" onclick="editUser('+i+')"><span class="material-symbols-outlined" style="font-size:1.1rem">edit</span></button>'+(u.email!=='admin@fleetguard.io'?'<button class="icon-btn del" onclick="deleteUser('+i+')"><span class="material-symbols-outlined" style="font-size:1.1rem">delete</span></button>':'')+'</div></td></tr>').join('')}
function openModal(pre,idx){document.getElementById('modal-title').textContent=idx!=null?'Edit User':'Add User';document.getElementById('edit-id').value=idx!=null?idx:'';document.getElementById('f-name').value=pre?.name||'';document.getElementById('f-email').value=pre?.email||'';document.getElementById('f-role').value=pre?.role||'Viewer';document.getElementById('modal').classList.add('open')}
function closeModal(){document.getElementById('modal').classList.remove('open')}
function editUser(i){openModal(loadUsers()[i],i)}
function deleteUser(i){const u=loadUsers();const n=u[i].name;u.splice(i,1);saveUsers(u);render();showToast(n+' removed','warn')}
function saveUser(e){e.preventDefault();const users=loadUsers();const obj={name:document.getElementById('f-name').value.trim(),email:document.getElementById('f-email').value.trim(),role:document.getElementById('f-role').value};const idx=document.getElementById('edit-id').value;if(idx!=='')users[parseInt(idx)]=obj;else users.push(obj);saveUsers(users);render();closeModal();showToast(obj.name+' saved')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
render();</script></body></html>
