<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FleetGuard — Dispatcher Board v2 Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<style>
/* ── FleetGuard design tokens ── */
:root{
  --bg:#10131a; --surface:#181c27; --surface2:#1e2333; --surface3:#252c3d;
  --border:#2a3147; --border2:#323d58;
  --primary:#ff5722; --primary-dim:rgba(255,87,34,.12); --primary-glow:rgba(255,87,34,.22);
  --success:#78dc77; --success-bg:rgba(120,220,119,.12);
  --warning:#f59e0b; --warning-bg:rgba(245,158,11,.12);
  --danger:#ff4444;  --danger-bg:rgba(255,68,68,.12);
  --text:#e1e2eb; --text2:#9aa3b8; --text3:#5b6478;
  --radius:10px; --radius-lg:14px;
  --sidebar-bg:#12151f; --sidebar-border:#1e2333;
  --shadow-card:0 2px 12px rgba(0,0,0,.3); --shadow-lg:0 8px 32px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px}

/* ── Sidebar ── */
#sidebar{width:185px;background:var(--sidebar-bg);border-right:1px solid var(--sidebar-border);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:18px 14px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--sidebar-border)}
.logo-icon{width:36px;height:36px;background:var(--primary);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-text{font-weight:800;font-size:14px;line-height:1.2} .logo-sub{font-size:10px;color:var(--text3);font-weight:500}
nav{padding:10px 8px;flex:1;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;transition:all .15s;border:none;background:none;width:100%}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--primary);color:#fff;box-shadow:0 0 18px var(--primary-glow)}
.ms{font-family:'Material Symbols Outlined';font-size:18px;font-style:normal;font-weight:300;line-height:1}
.sidebar-footer{padding:10px 8px;border-top:1px solid var(--sidebar-border)}
.sign-out{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--radius);cursor:pointer;color:#f87171;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;width:100%;border:none;background:none}

/* ── Main ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:54px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
#page-title{font-size:18px;font-weight:700;flex:1}
.role-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:var(--primary-dim);color:var(--primary)}
.user-pill{font-size:12px;color:var(--text2);background:var(--surface2);padding:5px 12px;border-radius:20px}
#content{flex:1;overflow-y:auto;padding:22px 24px}

/* ── Shared atoms ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-green{background:var(--success-bg);color:var(--success)}
.badge-yellow{background:var(--warning-bg);color:var(--warning)}
.badge-red{background:var(--danger-bg);color:var(--danger)}
.pill{font-size:10px;padding:2px 7px;border-radius:8px;display:inline-flex;align-items:center;gap:2px;border:1px solid currentColor;white-space:nowrap;font-weight:600}

/* ── Preview tabs ── */
.preview-tabs{display:flex;gap:8px;margin-bottom:18px}
.tab-btn{padding:7px 16px;border-radius:var(--radius);font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);transition:all .15s}
.tab-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 0 12px var(--primary-glow)}

/* ═══════════════════════════════════════════
   NEW 2-COLUMN DISPATCHER BOARD STYLES
═══════════════════════════════════════════ */

/* Outer 2-col grid — the key layout change */
.board-2col{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  align-items:start;           /* blocks don't stretch to match each other */
}

/* Each dispatcher block */
.dblock{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-card);
  cursor:pointer;
  transition:border-color .18s, box-shadow .18s, transform .15s;
  overflow:hidden;
}
.dblock:hover{
  border-color:var(--primary);
  box-shadow:0 0 0 1px var(--primary), var(--shadow-lg);
  transform:translateY(-2px);
}

/* Block header: avatar + name section + aggregated stats row */
.dblock-header{
  padding:16px 18px 14px;
  border-bottom:1px solid var(--border);
}
.dblock-top{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}
.dblock-avatar{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg, var(--primary) 0%, #ff8a65 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:800;color:#fff;flex-shrink:0;
  box-shadow:0 0 12px var(--primary-glow);
}
.dblock-name{font-size:15px;font-weight:800;margin-bottom:1px}
.dblock-meta{font-size:11px;color:var(--text2)}

/* Fleet health bar inside header */
.fleet-stats{
  display:flex;
  align-items:center;
  gap:8px;
}
.fleet-stat{
  display:flex;align-items:center;gap:4px;
  font-size:11px;font-weight:700;
  padding:3px 8px;border-radius:6px;
}
.fleet-stat.ok  {background:var(--success-bg);color:var(--success)}
.fleet-stat.warn{background:var(--warning-bg);color:var(--warning)}
.fleet-stat.crit{background:var(--danger-bg); color:var(--danger)}
.fleet-stat .ms {font-size:13px}

/* Health bar */
.health-bar-wrap{flex:1;height:4px;background:var(--surface3);border-radius:4px;overflow:hidden;min-width:40px}
.health-bar-fill{height:100%;border-radius:4px;transition:width .3s}

/* Truck rows inside the block */
.dblock-trucks{padding:4px 0 4px}

.truck-row{
  display:flex;
  align-items:center;
  padding:8px 18px;
  gap:12px;
  border-bottom:1px solid var(--border);
  transition:background .12s;
  position:relative;
}
.truck-row:last-child{border-bottom:none}
.truck-row:hover{background:var(--surface2)}

/* Left accent line – hierarchy indicator */
.truck-row::before{
  content:'';
  position:absolute;
  left:0;top:0;bottom:0;
  width:3px;
  background:transparent;
  border-radius:0 2px 2px 0;
  transition:background .15s;
}
.truck-row:hover::before{background:var(--primary)}
.truck-row.has-issue::before{background:var(--warning)}
.truck-row.has-critical::before{background:var(--danger)}

.truck-icon{
  width:30px;height:30px;border-radius:8px;
  background:var(--surface3);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.truck-icon .ms{font-size:15px;color:var(--text3)}

.truck-info{flex:1;min-width:0}
.truck-num{font-size:13px;font-weight:700;line-height:1.2}
.truck-driver{font-size:11px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.truck-pills{display:flex;gap:4px;flex-shrink:0;align-items:center}

/* Filtered view back header */
.filtered-header{
  display:flex;align-items:center;gap:14px;
  margin-bottom:20px;padding-bottom:16px;
  border-bottom:1px solid var(--border);
}
.back-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--radius);background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.back-btn:hover{background:var(--surface3);color:var(--text)}

/* Filtered truck cards — same as existing Vehicles style */
.vehicle-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.vehicle-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow-card);cursor:pointer;transition:all .15s}
.vehicle-card:hover{border-color:rgba(255,87,34,.4);box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.status-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <div><div class="logo-text">FleetGuard</div><div class="logo-sub">Safety &amp; Compliance</div></div>
  </div>
  <nav>
    <button class="nav-item"><span class="ms">dashboard</span>Dashboard</button>
    <button class="nav-item"><span class="ms">local_shipping</span>Vehicles</button>
    <button class="nav-item"><span class="ms">person</span>Drivers</button>
    <button class="nav-item"><span class="ms">calendar_today</span>Calendar</button>
    <button class="nav-item"><span class="ms">analytics</span>Reports</button>
    <button class="nav-item active" id="nav-board"><span class="ms">grid_view</span>Dispatch Board</button>
    <button class="nav-item"><span class="ms">minor_crash</span>Driver Portal</button>
    <button class="nav-item"><span class="ms">group</span>Users</button>
  </nav>
  <div class="sidebar-footer">
    <button class="sign-out"><span class="ms">logout</span>Sign Out</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <div id="page-title">Dispatch Board</div>
    <span class="role-badge">&#x25CF; Admin</span>
    <div class="user-pill">raitis.freimanis89@gmail...</div>
  </div>
  <div id="content">
    <div class="preview-tabs">
      <button class="tab-btn active" onclick="showView('board',this)">📋 Board View (2-col)</button>
      <button class="tab-btn" onclick="showView('filtered',this)">🔍 Dispatcher Fleet View</button>
    </div>

    <!-- BOARD VIEW -->
    <div id="view-board">
      <div class="board-2col" id="board-grid"></div>
    </div>

    <!-- FILTERED VIEW -->
    <div id="view-filtered" style="display:none">
      <div class="filtered-header">
        <button class="back-btn" onclick="showView('board',document.querySelector('.tab-btn'))">
          <span class="ms" style="font-size:15px">arrow_back</span> All Dispatchers
        </button>
        <div style="display:flex;align-items:center;gap:10px">
          <div id="fav" style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#ff8a65);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff"></div>
          <div>
            <div id="fname" style="font-size:16px;font-weight:800"></div>
            <div id="fsub" style="font-size:12px;color:var(--text2);margin-top:1px"></div>
          </div>
        </div>
      </div>
      <div class="vehicle-card-grid" id="filtered-grid"></div>
    </div>
  </div>
</div>

<script>
/* ── Mock data matching real FleetGuard dispatchers ── */
const D = [
  { name:'Ray', trucks:[
    { num:'25124', trailer:'118784', driver:'Ngawang Dorjee',        b:34, t:0,  s:34, st:'ok'  },
    { num:'7650',  trailer:'118530', driver:'Roderick Gaillard',     b:25, t:6,  s:25, st:'ok'  },
    { num:'25086', trailer:'118498', driver:'Clarence Strickland Jr',b:38, t:15, s:38, st:'warn'},
    { num:'25150', trailer:'118582', driver:'Nathaniel Walker',      b:22, t:7,  s:22, st:'ok'  },
    { num:'26039', trailer:'119006', driver:'Michael Cooper Jr',     b:22, t:15, s:22, st:'warn'},
  ]},
  { name:'Andy', trucks:[
    { num:'7903',  trailer:'118586', driver:'Dandre Marquez Peele',  b:21, t:1,  s:21, st:'ok'  },
    { num:'26014', trailer:'118527', driver:'Tony Andrew Hill',      b:25, t:7,  s:25, st:'ok'  },
    { num:'7702',  trailer:'118800', driver:'Joshua Gary',           b:13, t:12, s:49, st:'ok'  },
    { num:'7662',  trailer:'118964', driver:'Henry Mitchell',        b:40, t:6,  s:40, st:'warn'},
  ]},
  { name:'Alex', trucks:[
    { num:'25015', trailer:'119101', driver:'Arnulfo Tupas Jr',      b:35, t:13, s:35, st:'ok'  },
    { num:'24121', trailer:'118770', driver:'Kemar Lee',             b:29, t:14, s:29, st:'ok'  },
    { num:'25021', trailer:'118120', driver:'Benjamin Sebastiane',   b:40, t:13, s:40, st:'warn'},
  ]},
  { name:'Arthur', trucks:[
    { num:'25088', trailer:'118469', driver:'Darrell Britt Jr',      b:34, t:11, s:34, st:'ok'  },
    { num:'25094', trailer:'118669', driver:'Christopher Cobbs',     b:33, t:15, s:33, st:'warn'},
    { num:'25022', trailer:'118396', driver:'Rodney Merritt',        b:25, t:8,  s:25, st:'ok'  },
    { num:'25128', trailer:'118764', driver:'Darius Walker',         b:27, t:7,  s:27, st:'ok'  },
    { num:'26029', trailer:'119066', driver:'Michael Cooper Jr',     b:22, t:15, s:22, st:'warn'},
    { num:'25088b',trailer:'118410', driver:'Keith Palmer',          b:18, t:3,  s:18, st:'ok'  },
  ]},
  { name:'Mario', trucks:[
    { num:'25124b',trailer:'118790', driver:'Ngawang Dorjee',        b:34, t:0,  s:34, st:'ok'     },
    { num:'7650b', trailer:'118532', driver:'Roderick Gaillard',     b:25, t:6,  s:25, st:'ok'     },
    { num:'7662b', trailer:'118970', driver:'Henry Mitchell',        b:127,t:6,  s:127,st:'critical'},
  ]},
  { name:'Cody', trucks:[
    { num:'25128b',trailer:'118766', driver:'Darius Walker',         b:27, t:7,  s:27, st:'ok'  },
    { num:'7523',  trailer:'118347', driver:'Jordan Cole',           b:18, t:8,  s:18, st:'ok'  },
  ]},
  { name:'Max', trucks:[
    { num:'7867',  trailer:'118173', driver:'Leon Parkinson',        b:33, t:33, s:33, st:'warn'   },
    { num:'26027', trailer:'118518', driver:'Kaleb Gulley',          b:28, t:8,  s:28, st:'ok'     },
    { num:'25014', trailer:'119104', driver:'Montrell Martin',       b:39, t:15, s:39, st:'warn'   },
    { num:'23009', trailer:'118200', driver:'Carl J',                b:127,t:15, s:127,st:'critical'},
  ]},
  { name:'Carl J', trucks:[
    { num:'24148', trailer:'118201', driver:'James Thornton',        b:61, t:5,  s:61, st:'critical'},
  ]},
];

/* ── Helpers ── */
function ini(n){ return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }

function bc(v){ return v>42?'danger':v>35?'warn':'ok'; }
function tc(v){ return v>14?'warn':'ok'; }
function sc(v){ return v>60?'danger':v>53?'warn':'ok'; }
function worstOf(b,t,s){
  if(b==='danger'||t==='danger'||s==='danger') return 'danger';
  if(b==='warn'||t==='warn'||s==='warn') return 'warn';
  return 'ok';
}
function stateColor(st){ return st==='critical'?'danger':st==='warn'?'warn':'ok'; }
function pillClass(state){ return state==='danger'?'badge-red':state==='warn'?'badge-yellow':'badge-green'; }

function pill(icon, val, state){
  return `<span class="pill ${pillClass(state)}">${icon} ${val}d</span>`;
}

function statusBadge(st){
  if(st==='critical') return '<span class="badge badge-red">Critical</span>';
  if(st==='warn')     return '<span class="badge badge-yellow">Warning</span>';
  return '<span class="badge badge-green">OK</span>';
}

/* ── Build board ── */
function buildBoard(){
  document.getElementById('board-grid').innerHTML = D.map(d => {
    const total = d.trucks.length;
    const critN = d.trucks.filter(t=>t.st==='critical').length;
    const warnN = d.trucks.filter(t=>t.st==='warn').length;
    const okN   = total - critN - warnN;
    const healthPct = Math.round((okN / total) * 100);
    const barColor = critN>0 ? 'var(--danger)' : warnN>0 ? 'var(--warning)' : 'var(--success)';

    /* Aggregated fleet stat chips */
    const statsHtml = [
      okN   > 0 ? `<div class="fleet-stat ok">  <span class="ms">check_circle</span>${okN} OK</div>`   : '',
      warnN > 0 ? `<div class="fleet-stat warn"><span class="ms">warning</span>${warnN} Warn</div>` : '',
      critN > 0 ? `<div class="fleet-stat crit"><span class="ms">error</span>${critN} Critical</div>` : '',
      `<div class="health-bar-wrap" title="${healthPct}% fleet healthy">
         <div class="health-bar-fill" style="width:${healthPct}%;background:${barColor}"></div>
       </div>`,
    ].join('');

    /* Per-truck rows */
    const rows = d.trucks.map(t => {
      const bState = bc(t.b), tState = tc(t.t), sState = sc(t.s);
      const rowState = t.st==='critical' ? 'has-critical' : (t.st==='warn' ? 'has-issue' : '');
      return `
        <div class="truck-row ${rowState}">
          <div class="truck-icon"><span class="ms">local_shipping</span></div>
          <div class="truck-info">
            <div class="truck-num">Truck #${t.num}</div>
            <div class="truck-driver">👤 ${t.driver}</div>
          </div>
          <div class="truck-pills">
            ${pill('🔧', t.b, bState)}
            ${pill('⭕', t.t, tState)}
            ${pill('🔵', t.s, sState)}
          </div>
        </div>`;
    }).join('');

    return `
      <div class="dblock" onclick="openFilter('${d.name}')">
        <div class="dblock-header">
          <div class="dblock-top">
            <div class="dblock-avatar">${ini(d.name)}</div>
            <div style="flex:1;min-width:0">
              <div class="dblock-name">${d.name}</div>
              <div class="dblock-meta">${total} truck${total!==1?'s':''} &nbsp;·&nbsp; Click to view fleet →</div>
            </div>
          </div>
          <div class="fleet-stats">${statsHtml}</div>
        </div>
        <div class="dblock-trucks">${rows}</div>
      </div>`;
  }).join('');
}

/* ── Filtered view ── */
function openFilter(name){
  const d = D.find(x=>x.name===name);
  document.getElementById('fav').textContent  = ini(name);
  document.getElementById('fname').textContent = name + "'s Fleet";
  document.getElementById('fsub').textContent  = d.trucks.length + ' trucks assigned';
  document.getElementById('filtered-grid').innerHTML = d.trucks.map(t => {
    const bState=bc(t.b), tState=tc(t.t), sState=sc(t.s);
    return `
      <div class="vehicle-card">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <div>
            <div style="font-size:15px;font-weight:700">Truck #${t.num}</div>
            <div style="font-size:12px;color:var(--text2)">Trailer #${t.trailer}</div>
          </div>
          ${statusBadge(t.st)}
        </div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:2px">👤 ${t.driver}</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:10px">📡 ${name}</div>
        <div class="status-row">
          ${pill('🔧 Brakes', t.b, bState)}
          ${pill('⭕ Tyres', t.t, tState)}
          ${pill('🔵 Service', t.s, sState)}
        </div>
        <div style="margin-top:10px;font-size:11px;color:var(--primary);font-weight:700;display:flex;align-items:center;gap:4px">
          <span class="ms" style="font-size:13px">open_in_new</span> Open full detail
        </div>
      </div>`;
  }).join('');
  showView('filtered', document.querySelectorAll('.tab-btn')[1]);
}

function showView(v, btn){
  document.getElementById('view-board').style.display    = v==='board'    ? '' : 'none';
  document.getElementById('view-filtered').style.display = v==='filtered' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.getElementById('page-title').textContent = v==='filtered' ? 'Dispatch Board' : 'Dispatch Board';
}

buildBoard();
</script>
</body>
</html>
