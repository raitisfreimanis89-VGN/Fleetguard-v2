<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FleetGuard</title>
<!--
  Clean-URL router for the driver portal.
  GitHub Pages serves this for any unmatched path. We map:
     /driver/<TRUCK>  ->  /driver.html?v=<TRUCK>
     /driver          ->  /driver.html
  so SMS links can use the carrier-friendly form  https://fleetguards.app/driver/1024
  (no ".html" and no "?query" that A2P spam filters flag).
-->
<script>
(function () {
  var path = location.pathname.replace(/\/+$/, "");          // strip trailing slashes
  try { path = decodeURIComponent(path); } catch (e) {}
  var m = path.match(/^\/driver(?:\/(.*))?$/i);              // /driver or /driver/<truck>
  if (m) {
    var truck = (m[1] || "").trim();
    location.replace("/driver.html" + (truck ? ("?v=" + encodeURIComponent(truck)) : ""));
    return;
  }
  // Genuine 404 — show a simple branded page.
  document.documentElement.innerHTML =
    '<head><meta charset="utf-8"><title>Not found · FleetGuard</title></head>' +
    '<body style="margin:0;height:100vh;display:flex;align-items:center;justify-content:center;' +
    'font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#10131a;color:#e1e2eb">' +
    '<div style="text-align:center"><div style="font-size:56px;font-weight:800">404</div>' +
    '<p style="color:#9aa3b8">That page doesn’t exist.</p>' +
    '<p><a href="/" style="color:#da6536;font-weight:700;text-decoration:none">Go to FleetGuard →</a></p></div></body>';
})();
</script>
</head>
<body></body>
</html>
