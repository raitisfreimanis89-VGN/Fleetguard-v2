<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FleetGuard – Safety & Compliance</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="stylesheet" href="css/titan-slate-login.css">
</head>
<body>

<div id="loading-overlay" class="loading-overlay">
  <div class="spinner" style="border-color:var(--primary);border-top-color:transparent;"></div>
  Loading FleetGuard...
</div>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon">🚛</div>
      <h1>FleetGuard</h1>
      <p>Safety & Compliance Platform</p>
    </div>
    <div id="login-db-setup">
      <div class="login-divider">Connect your Supabase database first</div>
      <div id="ls-db-error" class="login-error"></div>
      <div class="login-field">
        <label>Supabase Project URL</label>
        <input type="text" id="ls-sb-url" placeholder="https://xxxx.supabase.co"/>
      </div>
      <div class="login-field">
        <label>Supabase Anon Key</label>
        <input type="text" id="ls-sb-key" placeholder="eyJhbGciOiJIUzI1..."/>
      </div>
      <button id="ls-connect-btn" class="btn btn-primary login-btn-full" onclick="connectDbFromLogin()">Connect & Continue</button>
    </div>
    <div id="login-form-section">
      <div id="login-error" class="login-error"></div>
      <div class="login-field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')signIn()"/>
      </div>
      <div class="login-field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')signIn()"/>
      </div>
      <button id="login-btn" class="btn btn-primary login-btn-full" onclick="signIn()">Sign In</button>
      <div class="login-divider" style="margin-top:16px">
        <a href="#" onclick="localStorage.removeItem('sb_url');localStorage.removeItem('sb_key');location.reload();return false" style="font-size:12px;color:var(--text3)">Change database</a>
      </div>
    </div>
  </div>
</div>

<div id="app" style="display:none">
  <div id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🚛</div>
      <div>
        <div class="logo-title">FleetGuard</div>
        <div class="logo-sub">Safety & Compliance</div>
      </div>
    </div>
    <nav>
      <button class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard"><span class="nav-icon">📊</span> Dashboard</button>
      <button class="nav-item" onclick="navigate('vehicles')" id="nav-vehicles"><span class="nav-icon">🚛</span> Vehicles</button>
      <button class="nav-item" onclick="navigate('drivers')" id="nav-drivers"><span class="nav-icon">👤</span> Drivers</button>
      <button class="nav-item" onclick="navigate('calendar')" id="nav-calendar"><span class="nav-icon">📅</span> Calendar</button>
      <button class="nav-item" onclick="navigate('reports')" id="nav-reports"><span class="nav-icon">📈</span> Reports</button>
      <button class="nav-item" onclick="navigate('portal')" id="nav-portal"><span class="nav-icon">🛡️</span> Driver Portal</button>
      <button class="nav-item" onclick="navigate('users')" id="nav-users" style="display:none"><span class="nav-icon">👥</span> Users</button>
    </nav>
    <div style="padding:12px 10px;border-top:1px solid rgba(255,255,255,.06);margin-top:auto">
      <button class="nav-item" onclick="signOut()" style="color:#f87171;width:100%"><span class="nav-icon">🚪</span> Sign Out</button>
    </div>
  </div>
  <div id="main">
    <div id="topbar">
      <h1 id="page-title">Dashboard</h1>
      <div class="user-bar">
        <span id="role-badge" class="badge badge-gray">👁 Dispatcher</span>
        <span id="user-pill" class="user-email"></span>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="confirm-modal" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:380px">
    <div class="modal-header" id="confirm-title">Confirm</div>
    <div class="modal-body" id="confirm-body" style="color:var(--text2);font-size:13px;line-height:1.6"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="confirmResolve(false)">Cancel</button>
      <button class="btn btn-danger" onclick="confirmResolve(true)">Delete</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
