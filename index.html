<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FleetGuard - Safety &amp; Compliance</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; connect-src https://tmpdsiuadafbkmldvlki.supabase.co wss://tmpdsiuadafbkmldvlki.supabase.co; img-src 'self' data:;">
  <script src="js/supabase.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/titan-slate-login.css"/>
</head>
<body>

<div id="loading-overlay" class="loading-overlay">
  <div class="spinner" style="border-color:var(--primary);border-top-color:transparent;"></div>
  Loading FleetGuard...
</div>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon">&#x1F69B;</div>
      <h1>FleetGuard</h1>
      <p>Safety &amp; Compliance Platform</p>
      <div class="ts-headline">
        Every route.<br>
        Every driver.<br>
        <span>Under control.</span>
      </div>
      <div class="ts-status">
        <div class="ts-stat">
          <span class="ts-stat-lbl">System</span>
          <span class="ts-stat-val"><span class="ts-live-dot"></span>All nodes live</span>
        </div>
        <div class="ts-stat">
          <span class="ts-stat-lbl">Security</span>
          <span class="ts-stat-val ts-white">AES-256</span>
        </div>
      </div>
    </div>
    <div id="login-form-section">
      <div class="ts-form-heading">
        <div class="ts-form-title">Welcome back</div>
        <p class="ts-form-sub">Sign in to your fleet dashboard</p>
      </div>
      <div id="login-error" class="login-error"></div>
      <div class="login-field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')signIn()"/>
      </div>
      <div class="login-field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;" onkeydown="if(event.key==='Enter')signIn()"/>
      </div>
      <button id="login-btn" class="btn btn-primary login-btn-full" onclick="signIn()">Sign In</button>
    </div>
  </div>
</div>

<div id="app" style="display:none">
  <div id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">&#x1F69B;</div>
      <div>
        <div class="logo-title">FleetGuard</div>
        <div class="logo-sub">Safety &amp; Compliance</div>
      </div>
    </div>
    <nav>
      <button class="nav-item" onclick="navigate('dispatcher-board')" id="nav-dispatcher-board">
        <span class="nav-icon" style="font-family:'Material Symbols Outlined';font-size:20px;font-weight:300;line-height:1">grid_view</span>
        Dispatch Board
      </button>
      <button class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
        <span class="nav-icon" style="font-family:'Material Symbols Outlined';font-size:20px;font-weight:300;line-height:1">dashboard</span>
        Dashboard
      </button>
      <button class="nav-item" onclick="navigate('vehicles')" id="nav-vehicles">
        <span class="nav-icon" style="font-family:'Material Symbols Outlined';font-size:20px;font-weight:300;line-height:1">local_shipping</span>
        Vehicles
      </button>
      <button class="nav-item" onclick="navigate('drivers')" id="nav-drivers">
        <span class="nav-icon" style="font-family:'Material Symbols Outlined';font-size:20px;font-weight:300;line-height:1">person</span>
        Drivers
      </button>
      <button class="nav-item" onclick="navigate('calendar')" id="nav-calendar">
        <span class="nav-icon" style="font-family:'Material Symbols Outlined';font-size:20px;font-weight:300;line-height:1">calendar_today</span>
        Calendar
      </button>
      <button class="nav-item" onclick="navigate('reports')" id="nav-reports">
        <span class="nav-icon" style="font-family:'Material Symbols Outlined';font-size:20px;font-weight:300;line-height:1">analytics</span>
        Reports
      </button>
      <button class="nav-item" onclick="navigate('portal')" id="nav-portal">
        <span class="nav-icon" style="font-family:'Material Symbols Outlined';font-size:20px;font-weight:300;line-height:1">minor_crash</span>
        Driver Portal
      </button>
      <button class="nav-item" onclick="navigate('reminders')" id="nav-reminders" style="display:none">
        <span class="nav-icon" style="font-family:'Material Symbols Outlined';font-size:20px;font-weight:300;line-height:1">notifications_active</span>
        Reminders
      </button>
      <button class="nav-item" onclick="navigate('users')" id="nav-users" style="display:none">
        <span class="nav-icon" style="font-family:'Material Symbols Outlined';font-size:20px;font-weight:300;line-height:1">group</span>
        Users
      </button>
    </nav>
    <div id="sidebar-footer" style="padding:12px 10px;border-top:1px solid rgba(255,255,255,.05);margin-top:auto">
      <button class="nav-item" onclick="signOut()" style="color:#f87171;width:100%">
        <span class="nav-icon" style="font-family:'Material Symbols Outlined';font-size:20px;font-weight:300;line-height:1">logout</span>
        Sign Out
      </button>
    </div>
  </div>

  <div id="nav-backdrop" onclick="closeNav()"></div>

  <div id="main">
    <div id="topbar">
      <button id="mobile-menu-btn" onclick="toggleNav()" aria-label="Open menu">
        <span class="nav-icon" style="font-family:'Material Symbols Outlined';font-size:24px;font-weight:300;line-height:1">menu</span>
      </button>
      <h1 id="page-title">Dashboard</h1>
      <img src="img/vgn-logo-dark.png" alt="VGN Trucking" class="topbar-brand-logo"/>
      <div class="user-bar">
        <span id="role-badge" class="badge badge-gray">&#x1F396; Dispatcher</span>
        <span id="user-pill" class="user-email"></span>
        <button id="theme-toggle" title="Toggle dark/light mode" onclick="toggleTheme()">
          <span id="theme-icon" style="font-family:'Material Symbols Outlined';font-size:20px;line-height:1;font-weight:300">light_mode</span>
        </button>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="confirm-modal" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:380px">
    <div class="modal-header" id="confirm-title">Confirm</div>
    <div class="modal-body" id="confirm-body" style="color:var(--text2);font-size:13px;line-height:1.6"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="confirmResolve(false)">Cancel</button>
      <button class="btn btn-danger" onclick="confirmResolve(true)">Delete</button>
    </div>
  </div>
</div>

<div id="add-vehicle-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeAddVehicleModal()">
  <div class="modal" style="max-width:480px">
    <div class="modal-header" style="display:flex;justify-content:space-between;align-items:center">
      <span>🚛 Add to Fleet</span>
      <button class="btn btn-ghost btn-sm" onclick="closeAddVehicleModal()" style="font-size:18px;line-height:1;padding:2px 8px">×</button>
    </div>
    <div class="modal-body" id="avm-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAddVehicleModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doAddFromModal()">+ Add to Fleet</button>
    </div>
  </div>
</div>

<script>
  (function() {
    var saved = localStorage.getItem('fg_theme') || 'dark';
    if (saved === 'light') {
      document.documentElement.classList.add('light');
      document.body.classList.add('light');
    }
  })();
  function toggleTheme() {
    var isLight = document.body.classList.contains('light');
    var next = isLight ? 'dark' : 'light';
    document.body.classList.toggle('light', !isLight);
    document.documentElement.classList.toggle('light', !isLight);
    localStorage.setItem('fg_theme', next);
    var icon = document.getElementById('theme-icon');
    if (icon) icon.textContent = next === 'light' ? 'dark_mode' : 'light_mode';
  }
  window.addEventListener('DOMContentLoaded', function() {
    var saved = localStorage.getItem('fg_theme') || 'dark';
    var icon = document.getElementById('theme-icon');
    if (icon) icon.textContent = saved === 'light' ? 'dark_mode' : 'light_mode';
  });

  // ── Mobile nav drawer ──────────────────────────────────────
  function toggleNav() { document.body.classList.toggle('nav-open'); }
  function closeNav()  { document.body.classList.remove('nav-open'); }
  // Close the drawer after tapping any sidebar item (mobile)
  document.addEventListener('click', function(e) {
    var item = e.target.closest('#sidebar .nav-item');
    if (item) closeNav();
  });
</script>

<link rel="stylesheet" href="css/reminders.css"/>
<script src="js/app.js"></script>
<script src="js/reminders.js"></script>
</body>
</html>
